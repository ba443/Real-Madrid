<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real Madrid CF — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <img src="images/realmadrid.jpg" alt="Real Madrid" class="nav-logo-img"/>
    <div class="nav-brand">Real<br>Madrid</div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="squad.html">Squad</a></li>
    <li><a href="matches.html">Matches</a></li>
    <li><a href="history.html">History</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html" class="nav-cta active-link">Sign In</a></li>
  </ul>
</nav>
<div class="rm-toast" id="toast"><div class="toast-title" id="toast-title"></div><div class="toast-msg" id="toast-msg"></div></div>
<div style="padding-top:70px;min-height:100vh;background:linear-gradient(135deg,#000 0%,#0a0800 100%);display:flex;align-items:center;justify-content:center;position:relative;">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(201,168,76,0.05),transparent);"></div>
  <div class="login-wrap">
    <div class="login-logo">
      <img src="images/realmadrid.jpg" alt="Real Madrid" style="width:60px;height:60px;object-fit:contain;"/>
      <div class="login-logo-text">Real Madrid</div>
    </div>
    <div class="login-box">
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-sub">Sign in to your Madridista account</p>
      <div class="form-group"><label class="form-label">Username or Email</label><input type="text" class="form-input" placeholder="your@email.com" id="login-email"/></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" placeholder="••••••••" id="login-pass"/></div>
      <div class="form-check-group">
        <div class="form-check"><input type="checkbox" id="remember"/><label for="remember">Remember me</label></div>
        <a class="forgot-link" href="#">Forgot password?</a>
      </div>
      <button class="btn-gold" style="width:100%;padding:14px;" onclick="handleLogin()">Sign In</button>
      <div class="login-divider">or continue with</div>
      <div class="social-btns">
        <button class="social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn"><i class="fab fa-facebook-f"></i> Facebook</button>
      </div>
      <div class="register-link">Don't have an account? <a href="register.html" style="color:var(--gold);text-decoration:none;">Register now</a></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
