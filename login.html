<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real Madrid CF — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#C9A84C" stroke="#080808" stroke-width="2"/>
      <circle cx="50" cy="50" r="40" fill="#080808"/>
      <circle cx="50" cy="50" r="36" fill="#C9A84C"/>
      <circle cx="50" cy="50" r="30" fill="#080808"/>
      <text x="50" y="56" text-anchor="middle" font-family="serif" font-weight="900" font-size="18" fill="#C9A84C">RM</text>
    </svg>
    <div class="nav-brand">Real<br>Madrid</div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="squad.html">Squad</a></li>
    <li><a href="matches.html">Matches</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html" class="nav-cta active-link">Sign In</a></li>
  </ul>
</nav>

<div class="rm-toast" id="toast">
  <div class="toast-title" id="toast-title">Notification</div>
  <div class="toast-msg" id="toast-msg"></div>
</div>

<div style="padding-top:70px;min-height:100vh;background:linear-gradient(135deg,#000 0%,#0a0800 100%);display:flex;align-items:center;justify-content:center;position:relative;">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(201,168,76,0.05),transparent);"></div>
  <div class="login-wrap">
    <div class="login-logo">
      <svg width="60" height="60" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="#C9A84C"/>
        <circle cx="50" cy="50" r="40" fill="#080808"/>
        <circle cx="50" cy="50" r="36" fill="#C9A84C"/>
        <circle cx="50" cy="50" r="30" fill="#080808"/>
        <text x="50" y="56" text-anchor="middle" font-family="serif" font-weight="900" font-size="18" fill="#C9A84C">RM</text>
      </svg>
      <div class="login-logo-text">Real Madrid</div>
    </div>
    <div class="login-box">
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-sub">Sign in to your Madridista account</p>
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" class="form-input" placeholder="your@email.com" id="login-email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="••••••••" id="login-pass"/>
      </div>
      <div class="form-check-group">
        <div class="form-check">
          <input type="checkbox" id="remember"/>
          <label for="remember">Remember me</label>
        </div>
        <a class="forgot-link" href="#">Forgot password?</a>
      </div>
      <button class="btn-gold" style="width:100%;padding:14px;" onclick="handleLogin()">Sign In</button>
      <div class="login-divider">or continue with</div>
      <div class="social-btns">
        <button class="social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn"><i class="fab fa-facebook-f"></i> Facebook</button>
      </div>
      <div class="register-link">
        Don't have an account? <a href="#">Register now</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
